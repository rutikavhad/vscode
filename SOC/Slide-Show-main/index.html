<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photo Album Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Photo Album Builder</h2>

<div id="upload-section">
  <input type="file" id="upload" multiple accept="image/*">
  <button id="slideshowSelected">Start Slideshow</button>

  <label>
    Slide Time (sec):
    <input type="number" id="slideTime" value="5" min="1">
  </label>

  <button id="loadJsonBtn">Load JSON</button>
  <input type="file" id="jsonInput" accept=".json" hidden>
</div>

<h3>Gallery (Click to Add)</h3>
<div id="gallery"></div>

<h3>Slideshow Order (Click to Remove)</h3>
<div id="slideshowQueue" class="queue"></div>
<button id="clearQueue">Clear Order</button>

<div id="preview">
  <img id="previewImg">
</div>

<script src="script.js"></script>
</body>
</html>
