<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metro Live — Real-Time Train Tracker</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* ── Reset & tokens ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0a0c10;
  --panel:       #12151d;
  --panel-border:#1e2535;
  --text:        #e8eaf0;
  --muted:       #6b748a;
  --accent:      #f0c060;
  --red:         #17f8ed;
  --blue:        #e929d9;
  --green:       #52b788;
  --glow-red:    rgba(230,57,70,.25);
  --glow-blue:   rgba(69,123,157,.25);
  --glow-green:  rgba(82,183,136,.25);
  --radius:      12px;
  --font-ui:     'Syne', sans-serif;
  --font-mono:   'Space Mono', monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); overflow: hidden; }

/* ── Layout ──────────────────────────────────────────────────────────── */
#app {display: grid;
  grid-template-columns: 1fr;  /* full map */
  grid-template-rows: 64px 1fr;
  height: 100vh;
  gap: 0;
}

/* ── Topbar ──────────────────────────────────────────────────────────── */
#topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--panel-border);
  z-index: 10;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo-text span { color: var(--accent); }

#live-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  background: rgba(255,255,255,.04);
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--panel-border);
}
#live-badge .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--glow-green);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .3; }
}

#clock {
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--accent);
}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
#sidebar {
  background: var(--panel);
  border-right: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-section {
  padding: 18px 18px 12px;
  border-bottom: 1px solid var(--panel-border);
}
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* ── Line toggles ────────────────────────────────────────────────────── */
.line-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 6px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.line-toggle::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity .2s;
}
.line-toggle:hover::before { opacity: 1; }
.line-toggle.active { border-color: currentColor; }

.line-toggle[data-line="1"]               { color: var(--red); }
.line-toggle[data-line="1"]::before       { background: var(--glow-red); }
.line-toggle[data-line="2"]               { color: var(--blue); }
.line-toggle[data-line="2"]::before       { background: var(--glow-blue); }
.line-toggle[data-line="3"]               { color: var(--green); }
.line-toggle[data-line="3"]::before       { background: var(--glow-green); }

.line-info { display: flex; align-items: center; gap: 10px; position: relative; }
.line-swatch { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.line-name   { font-weight: 600; font-size: 14px; }
.line-count  {
  font-family: var(--font-mono);
  font-size: 11px;
  background: rgba(255,255,255,.08);
  padding: 2px 8px;
  border-radius: 10px;
  position: relative;
}

/* ── Speed control ───────────────────────────────────────────────────── */
.speed-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
}
.speed-row label {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  min-width: 60px;
}
#speed-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--panel-border);
  outline: none;
  cursor: pointer;
}
#speed-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 8px rgba(240,192,96,.5);
}
#speed-val {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  min-width: 36px;
  text-align: right;
}

/* ── Train list ──────────────────────────────────────────────────────── */
#train-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 10px;
}
#train-list::-webkit-scrollbar { width: 4px; }
#train-list::-webkit-scrollbar-track { background: transparent; }
#train-list::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }

.train-card {
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--panel-border);
  margin-bottom: 6px;
  font-size: 12px;
  transition: border-color .2s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.train-card::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 2px 0 0 2px;
}
.train-card[data-line="1"]::after { background: var(--red); }
.train-card[data-line="2"]::after { background: var(--blue); }
.train-card[data-line="3"]::after { background: var(--green); }
.train-card:hover { border-color: var(--muted); }

.train-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.train-id {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 11px;
}
.train-status {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 10px;
  font-family: var(--font-mono);
  letter-spacing: .5px;
}
.train-status.RUNNING    { background: rgba(82,183,136,.15); color: var(--green); }
.train-status.TURNAROUND { background: rgba(240,192,96,.15); color: var(--accent); }

.train-route {
  color: var(--text);
  margin-bottom: 4px;
  font-size: 11.5px;
  line-height: 1.4;
}
.train-route .arrow { color: var(--muted); margin: 0 4px; }

.progress-bar {
  height: 3px;
  background: var(--panel-border);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 6px;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .8s linear;
}
.progress-fill[data-line="1"] { background: var(--red); }
.progress-fill[data-line="2"] { background: var(--blue); }
.progress-fill[data-line="3"] { background: var(--green); }

.train-eta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

/* ── Stats footer ────────────────────────────────────────────────────── */
#stats-bar {
  padding: 10px 18px;
  border-top: 1px solid var(--panel-border);
  display: flex;
  gap: 20px;
}
.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-val {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
}
.stat-lbl {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── Map ─────────────────────────────────────────────────────────────── */
#map {
  position: relative;
  background: #0d1117;
}

/* Leaflet dark tiles + custom attribution */
.leaflet-container { background: #0d1117; font-family: var(--font-ui); }
.leaflet-control-attribution { background: rgba(10,12,16,.7) !important; color: var(--muted) !important; font-size: 9px; }
.leaflet-control-zoom a { background: var(--panel) !important; color: var(--text) !important; border-color: var(--panel-border) !important; }
.leaflet-control-zoom a:hover { background: var(--panel-border) !important; }

/* Train icon pulse */
.train-pulse {
  animation: trainPulse 1.2s ease-in-out infinite;
}
@keyframes trainPulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.15); }
}

/* ── Tooltip ─────────────────────────────────────────────────────────── */
.leaflet-popup-content-wrapper {
  background: var(--panel) !important;
  border: 1px solid var(--panel-border) !important;
  border-radius: var(--radius) !important;
  color: var(--text) !important;
  font-family: var(--font-ui) !important;
  box-shadow: 0 8px 32px rgba(0,0,0,.4) !important;
}
.leaflet-popup-tip { background: var(--panel) !important; }
.leaflet-popup-content { margin: 14px 16px !important; font-size: 13px !important; }

.popup-header { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
.popup-row { display: flex; justify-content: space-between; gap: 16px; color: var(--muted); font-size: 12px; margin-bottom: 3px; }
.popup-row span:last-child { color: var(--text); font-family: var(--font-mono); font-size: 11px; }

/* ── Loading overlay ─────────────────────────────────────────────────── */
#loading {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 9999;
  transition: opacity .5s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.loader-ring {
  width: 48px; height: 48px;
  border: 3px solid var(--panel-border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

/* ── Direction arrow ─────────────────────────────────────────────────── */
.dir-arrow { font-size: 9px; margin-left: 4px; }

/* ── Notification toast ──────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--muted);
  z-index: 1000;
  transform: translateY(20px);
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }
/* Sidebar overlay (not grid anymore) */
#sidebar {
  position: absolute;
  top: 64px;           /* below topbar */
  left: 0;
  width: 320px;
  height: calc(100% - 64px);
  background: var(--panel);
  border-right: 1px solid var(--panel-border);
  z-index: 1000;
  overflow-y: auto;
  transition: transform 0.3s ease;
}

/* Hidden state */
#sidebar.closed {
  transform: translateX(-100%);
}

/* Toggle button */
#toggleBtn {
  position: absolute;
  top: 80px;
  left: 10px;
  z-index: 1100;
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--panel-border);
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 6px;
}

#map {
  position: absolute;
  top: 64px;
  left: 0;
  width: 100%;
  height: calc(100% - 64px);
}
#toggleBtn {
  top: 70px;
}

</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-text">INITIALISING METRO</div>
</div>

<div id="app">

  <!-- ── Topbar ── -->
  <header id="topbar">
    <div class="logo">
      <div class="logo-icon">🚇</div>
      <div class="logo-text">Metro<span>Live</span></div>
    </div>
    <div id="live-badge">
      <div class="dot"></div>
      <span>REAL-TIME SIMULATION</span>
    </div>
    <div id="clock">--:--:--</div>
  </header>

<!-- Toggle Button -->
<button id="toggleBtn">☰</button>

<!-- Sidebar -->
<div id="sidebar">
  
  <!-- Line toggles -->
  <div class="sidebar-section">
    <div class="section-label">Metro Lines</div>
    <div id="line-toggles"></div>
  </div>

  <!-- Speed control -->
  <div class="sidebar-section">
    <div class="section-label">Simulation Speed</div>
    <div class="speed-row">
      <label>Speed</label>
      <input type="range" id="speed-slider" min="1" max="60" step="1" value="1">
      <div id="speed-val">1×</div>
    </div>
  </div>

  <!-- Train list -->
  <div style="padding: 14px 18px 6px; border-bottom: 1px solid var(--panel-border);">
    <div class="section-label">Active Trains</div>
  </div>
  <div id="train-list"></div>

  <!-- Stats -->
  <div id="stats-bar">
    <div class="stat">
      <div class="stat-val" id="stat-trains">0</div>
      <div class="stat-lbl">Trains</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-lines">0</div>
      <div class="stat-lbl">Lines</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-update">—</div>
      <div class="stat-lbl">Last Update</div>
    </div>
  </div>

</div>
<div id="map"></div>
<script>

const btn = document.getElementById("toggleBtn");
const sidebar = document.getElementById("sidebar");

btn.addEventListener("click", () => {
    sidebar.classList.toggle("closed");

    // change icon
    btn.innerText = sidebar.classList.contains("closed") ? "☰" : "✖";

    // fix map resize
    setTimeout(() => {
        state.map.invalidateSize();
    }, 300);
});
// ── State ────────────────────────────────────────────────────────────────────
const state = {
  lines:       {},      // id → line meta
  stations:    {},      // line_id → [stations]
  trains:      {},      // "lineId-trainId" → marker
  linePolylines:{},     // line_id → L.polyline
  activeLines: new Set(),
  speedMultiplier: 1,
  map: null,
  updateInterval: null,
  stationMarkers: {},   // line_id → [markers]
};

const LINE_COLORS = { 1: '#eb23bf', 2: '#457B9D', 3: '#52b788' };

// ── Map init ─────────────────────────────────────────────────────────────────
function initMap() {
 state.map = L.map('map', {
  center:  [28.63, 77.17],
  zoom:    12,
  zoomControl: false,
  attributionControl: true,
});
L.control.zoom({ position: 'topright' }).addTo(state.map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(state.map);
}

// ── Clock ────────────────────────────────────────────────────────────────────
function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('en-GB', { hour12: false });
  }
  tick();
  setInterval(tick, 1000);
}

// ── Train SVG icon ────────────────────────────────────────────────────────────
function trainIcon(color, direction, status) {
  const rot = direction === 'UP' ? '0' : '180';
  const opacity = status === 'TURNAROUND' ? '0.6' : '1';
  const glow = status === 'RUNNING' ? `filter:drop-shadow(0 0 6px ${color})` : '';
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28"
         style="transform:rotate(${rot}deg);opacity:${opacity};${glow}">
      <circle cx="14" cy="14" r="11" fill="${color}" stroke="#0a0c10" stroke-width="2"/>
      <path d="M14 7 L19 17 L14 15 L9 17 Z" fill="white"/>
    </svg>`;
  return L.divIcon({
    className: '',
    html: `<div class="train-pulse" style="transition:transform .8s linear">${svg}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
  });
}

function stationIcon(color) {
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14">
      <circle cx="7" cy="7" r="5" fill="${color}" opacity=".9" stroke="#0a0c10" stroke-width="1.5"/>
    </svg>`;
  return L.divIcon({
    className: '',
    html: svg,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

// ── Load lines and stations ───────────────────────────────────────────────────
async function loadLines() {
  const lines = await fetch('/api/lines').then(r => r.json());
  const togglesEl = document.getElementById('line-toggles');

  for (const line of lines) {
    state.lines[line.id] = line;
    state.activeLines.add(line.id);

    // Toggle button
    const btn = document.createElement('div');
    btn.className = 'line-toggle active';
    btn.dataset.line = line.id;
    btn.style.color = line.color;
    btn.innerHTML = `
      <div class="line-info">
        <div class="line-swatch" style="background:${line.color}"></div>
        <div class="line-name">${line.name}</div>
      </div>
      <div class="line-count" id="count-${line.id}">0</div>
    `;
    btn.addEventListener('click', () => toggleLine(line.id, btn));
    togglesEl.appendChild(btn);

    // Load stations and draw polyline
    await loadStations(line);
  }

  document.getElementById('stat-lines').textContent = lines.length;
}

async function loadStations(line) {
  const stations = await fetch(`/api/stations?line_id=${line.id}`).then(r => r.json());
  state.stations[line.id] = stations;

  // Draw route polyline
  const latlngs = stations.map(s => [s.latitude, s.longitude]);
  const poly = L.polyline(latlngs, {
    color: line.color,
    weight: 3,
    opacity: 0.7,
    dashArray: null,
  }).addTo(state.map);
  state.linePolylines[line.id] = poly;

  // Station markers
state.stationMarkers[line.id] = stations.map(s => {
  const m = L.marker([s.latitude, s.longitude], {
    icon: stationIcon(line.color),
    zIndexOffset: -100
  })
  .addTo(state.map)
  .bindTooltip(s.name, {
    permanent: false,
    direction: 'top',
    offset: [0, -10],
  });

  // ✅ ADD THIS (critical)
  m.on('click', () => {
    showStationPopup(s, line.id);
  });

  return m;
});
}

// ── Toggle line visibility ────────────────────────────────────────────────────
function toggleLine(lineId, btn) {
  if (state.activeLines.has(lineId)) {
    state.activeLines.delete(lineId);
    btn.classList.remove('active');
    state.linePolylines[lineId]?.setStyle({ opacity: 0 });
    state.stationMarkers[lineId]?.forEach(m => m.setOpacity(0));
    // Hide trains
    Object.entries(state.trains).forEach(([key, m]) => {
      if (key.startsWith(lineId + '-')) m.setOpacity(0);
    });
  } else {
    state.activeLines.add(lineId);
    btn.classList.add('active');
    state.linePolylines[lineId]?.setStyle({ opacity: 0.7 });
    state.stationMarkers[lineId]?.forEach(m => m.setOpacity(1));
    Object.entries(state.trains).forEach(([key, m]) => {
      if (key.startsWith(lineId + '-')) m.setOpacity(1);
    });
  }
}

// ── Live train update ─────────────────────────────────────────────────────────
async function updateTrains() {
  try {
    const speed = state.speedMultiplier;
    const res = await fetch(`/api/live_trains?speed_multiplier=${speed}`);
    if (!res.ok) throw new Error('API error');
    const trains = await res.json();

    const seen = new Set();
    const trainListEl = document.getElementById('train-list');
    const cards = {};

    // Build/update markers
    trains.forEach(t => {
      const key = `${t.line_id}-${t.train_id}`;
      seen.add(key);

      const color = t.line_color;
      const visible = state.activeLines.has(t.line_id);

      if (!state.trains[key]) {
        // Create new marker
        const marker = L.marker([t.lat, t.lng], {
          icon: trainIcon(color, t.direction, t.status),
          zIndexOffset: 100,
        }).addTo(state.map);

        marker.bindPopup('', { maxWidth: 240, closeButton: false });
        marker.on('click', () => {
          marker.setPopupContent(buildPopup(t));
          marker.openPopup();
        });

        state.trains[key] = marker;
      } else {
        // Smooth move
        const marker = state.trains[key];
        marker.setLatLng([t.lat, t.lng]);
        marker.setIcon(trainIcon(color, t.direction, t.status));
        if (marker.isPopupOpen()) {
          marker.setPopupContent(buildPopup(t));
        }
      }

      state.trains[key].setOpacity(visible ? 1 : 0);
      cards[key] = t;
    });

    // Remove stale markers
    Object.keys(state.trains).forEach(key => {
      if (!seen.has(key)) {
        state.map.removeLayer(state.trains[key]);
        delete state.trains[key];
      }
    });

    // Update sidebar counts
    const countByLine = {};
    trains.forEach(t => {
      if (!countByLine[t.line_id]) countByLine[t.line_id] = 0;
      if (state.activeLines.has(t.line_id)) countByLine[t.line_id]++;
    });
    Object.entries(countByLine).forEach(([lid, c]) => {
      const el = document.getElementById(`count-${lid}`);
      if (el) el.textContent = c;
    });

    // Rebuild train list (sorted by line, then id)
    trainListEl.innerHTML = '';
    const sorted = trains
      .filter(t => state.activeLines.has(t.line_id))
      .sort((a, b) => a.line_id - b.line_id || a.train_id - b.train_id);

    sorted.forEach(t => {
      const card = document.createElement('div');
      card.className = 'train-card';
      card.dataset.line = t.line_id;

      const dir = t.direction === 'UP' ? '↑' : '↓';
      const pct = (t.progress * 100).toFixed(0);

      card.innerHTML = `
        <div class="train-card-header">
          <div class="train-id" style="color:${t.line_color}">${t.line_name} · T${t.train_id}</div>
          <div class="train-status ${t.status}">${t.status}</div>
        </div>
        <div class="train-route">
          ${t.from_station} <span class="arrow">${dir}</span> ${t.to_station}
        </div>
        <div class="progress-bar">
          <div class="progress-fill" data-line="${t.line_id}" style="width:${pct}%"></div>
        </div>
        <div class="train-eta">
          ${t.status === 'RUNNING'
            ? `Next: <strong>${t.next_station}</strong> in ${t.eta_minutes} min`
            : `Departing in ${t.eta_minutes} min`}
        </div>
      `;

      card.addEventListener('click', () => {
        state.map.flyTo([t.lat, t.lng], 14, { duration: 0.8 });
      });

      trainListEl.appendChild(card);
    });

    // Totals
    document.getElementById('stat-trains').textContent = trains.length;
    const now = new Date();
    document.getElementById('stat-update').textContent =
      now.toLocaleTimeString('en-GB', { hour12: false });

  } catch (err) {
    console.error('Update failed:', err);
    showToast('Connection error – retrying…');
  }
}

function buildPopup(t) {
  const dir = t.direction === 'UP' ? '↑ Northbound / Outbound' : '↓ Southbound / Inbound';
  return `
    <div class="popup-header" style="color:${t.line_color}">
      ${t.line_name} · Train ${t.train_id}
    </div>
    <div class="popup-row"><span>Direction</span><span>${dir}</span></div>
    <div class="popup-row"><span>Status</span><span>${t.status}</span></div>
    <div class="popup-row"><span>From</span><span>${t.from_station}</span></div>
    <div class="popup-row"><span>To</span><span>${t.to_station}</span></div>
    <div class="popup-row"><span>Progress</span><span>${(t.progress*100).toFixed(1)}%</span></div>
    <div class="popup-row"><span>ETA next</span><span>${t.eta_minutes} min</span></div>
  `;
}
function getNextTrainsForStation(stationName, lineId, trains) {
  const list = [];

  const station = stationName.toLowerCase().trim();

  trains.forEach(t => {
    if (t.line_id !== lineId) return;

    const next = (t.next_station || "").toLowerCase().trim();
    const from = (t.from_station || "").toLowerCase().trim();

    // train coming to station
    if (next.includes(station)) {
      list.push({
        eta: t.eta_minutes,
        line: t.line_name
      });
    }

    // train currently at station
    else if (from.includes(station) && t.status === "STOPPED") {
      list.push({
        eta: 0,
        line: t.line_name
      });
    }
  });

  list.sort((a, b) => a.eta - b.eta);
  return list.slice(0, 3);
}


function showStationPopup(station, lineId) {

  fetch(`/api/live_trains?speed_multiplier=${state.speedMultiplier}`)
    .then(res => res.json())
    .then(trains => {

      const next = getNextTrainsForStation(
        station.name,
        lineId,
        trains
      );

      let html = `<div class="popup-header">${station.name}</div>`;

      if (next.length === 0) {
        html += `<div class="popup-row">No upcoming trains</div>`;
      } else {
        next.forEach((t, i) => {
          html += `
            <div class="popup-row">
              <span>${i + 1}. ${t.line}</span>
              <span>${t.eta === 0 ? "Arriving" : t.eta + " min"}</span>
            </div>
          `;
        });
      }

      L.popup()
        .setLatLng([station.latitude, station.longitude])
        .setContent(html)
        .openOn(state.map);
    })
    .catch(err => console.error("Popup error:", err));
}
// ── Speed slider ──────────────────────────────────────────────────────────────
function initSpeedControl() {
  const slider = document.getElementById('speed-slider');
  const val    = document.getElementById('speed-val');
  slider.addEventListener('input', () => {
    state.speedMultiplier = parseInt(slider.value);
    val.textContent = `${state.speedMultiplier}×`;
    showToast(`Speed: ${state.speedMultiplier}× real-time`);
  });
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  initMap();
  startClock();
  initSpeedControl();

  await loadLines();

  // First update
  await updateTrains();

  // Hide loader
  const loader = document.getElementById('loading');
  loader.classList.add('hidden');
  setTimeout(() => loader.remove(), 600);

  // Recurring updates every 5s
  state.updateInterval = setInterval(updateTrains, 5000);
}

boot();
</script>
